# ============================================================
# Market Mega — Nginx reverse proxy
# ============================================================
# Joylash:  /etc/nginx/sites-available/marketmega
# Aktivlash: sudo ln -s /etc/nginx/sites-available/marketmega /etc/nginx/sites-enabled/
# Tekshirish: sudo nginx -t
# Qayta yuklash: sudo systemctl reload nginx
#
# `your-domain.com`'ni o'z domeningiz bilan almashtiring.
# ============================================================

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # SSL certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload size — admin paneldan rasm yuklash uchun
    client_max_body_size 15M;

    # Logs
    access_log /var/log/nginx/marketmega-access.log;
    error_log  /var/log/nginx/marketmega-error.log;

    # Timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Static fayllar — to'g'ridan-to'g'ri nginx orqali (tezroq)
    location /static/ {
        alias /opt/marketmega/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Uploads — rasmlar
    location /static/uploads/ {
        alias /opt/marketmega/app/static/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Asosiy app (FastAPI uvicorn)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket / streaming uchun (kelajakda kerak bo'lsa)
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
