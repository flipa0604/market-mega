version: "3.9"

# Faqat PostgreSQL uchun. Botni o'zim Python bilan ishga tushiraman.
# `docker compose up -d` -> postgres konteyner ishga tushadi.
services:
  postgres:
    image: postgres:16-alpine
    container_name: marketmega-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketmega
    ports:
      - "5432:5432"
    volumes:
      - marketmega-pgdata:/var/lib/postgresql/data

volumes:
  marketmega-pgdata:
